name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build (debug)
        run: swift build
      - name: Assemble app bundle
        run: ./Scripts/build-app.sh release
      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: LubbyBar.app
          path: build/LubbyBar.app
