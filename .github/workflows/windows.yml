name: Windows build

on:
  push:
    paths:
      - 'windows/**'
      - '.github/workflows/windows.yml'
  pull_request:
    paths:
      - 'windows/**'
  workflow_dispatch:

jobs:
  core-tests:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Test lubby-core
        run: cargo test --manifest-path windows/core/Cargo.toml

  build:
    name: Build (windows-latest)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            windows/src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('windows/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-tauri-

      - name: Install frontend deps
        run: npm ci

      - name: Build the Tauri app (NSIS installer)
        run: npm run tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: lubby-bar-windows
          path: windows/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
